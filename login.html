<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Portal do Cliente HumanAI</title>
  <link rel="stylesheet" href="style.css?v=10001">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-container { width: 100%; max-width: 450px; padding: 20px; }
  </style>
</head>
<body>
  <div class="bg-animated"></div>
  
  <div class="login-container">
    <div class="card card-glow">
      <div class="text-center mb-6">
        <div class="logo-icon mx-auto mb-4" style="margin: 0 auto 20px;">
          <span>✦</span>
        </div>
        <h1 class="heading-md mb-2">Acesse seu Painel</h1>
        <p class="text-muted">Faça login para gerenciar sua Inteligência Artificial</p>
      </div>

      <form id="login-form" class="input-group" onsubmit="event.preventDefault(); window.location.href='portal.html?empresaId=1';">
        <div style="margin-bottom: var(--space-4);">
            <label class="input-label" style="display:block; margin-bottom: 5px;">E-mail da Empresa</label>
            <input type="email" class="input" value="contato@empresa.com" required>
        </div>
        
        <div style="margin-bottom: var(--space-6);">
            <label class="input-label" style="display:block; margin-bottom: 5px;">Senha</label>
            <input type="password" class="input" value="123456" required>
        </div>

        <button type="submit" class="btn btn-primary w-full" style="width: 100%;">
          Entrar na Plataforma
        </button>
      </form>
    </div>
  </div>
</body>
</html>

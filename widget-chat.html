<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat HumanAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: transparent;
    }

    /* ── BOTÃO FLUTUANTE ─── */
    #humanai-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,58,237,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      z-index: 9999;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: pulseBtn 2.5s ease-in-out infinite;
    }

    #humanai-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(124,58,237,0.7);
    }

    @keyframes pulseBtn {
      0%, 100% { box-shadow: 0 4px 20px rgba(124,58,237,0.5); }
      50% { box-shadow: 0 4px 30px rgba(124,58,237,0.8), 0 0 0 8px rgba(124,58,237,0.1); }
    }

    /* Bolinha de notificação */
    #humanai-notif {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      background: #ef4444;
      border-radius: 50%;
      border: 2px solid #fff;
      font-size: 9px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    /* ── JANELA DO CHAT ─── */
    #humanai-chat {
      position: fixed;
      bottom: 96px;
      right: 24px;
      width: 360px;
      height: 520px;
      background: #0d0d2b;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: none;
      flex-direction: column;
      z-index: 9998;
      overflow: hidden;
      border: 1px solid rgba(124,58,237,0.3);
      animation: slideUp 0.3s ease;
    }

    #humanai-chat.aberto { display: flex; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-header-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .chat-header-info { flex: 1; }

    .chat-header-nome {
      font-weight: 700;
      font-size: 14px;
      color: #fff;
    }

    .chat-header-status {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    .status-verde {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
    }

    .btn-fechar {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .btn-fechar:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* Mensagens */
    .chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0d0d2b;
    }

    .chat-msgs::-webkit-scrollbar { width: 4px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 8px;
      animation: msgIn 0.25s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.usuario { flex-direction: row-reverse; }

    .msg-av {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg-av.ia-av { background: linear-gradient(135deg,#7c3aed,#06b6d4); }
    .msg-av.us-av { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); }

    .msg-balao {
      max-width: 75%;
      padding: 10px 13px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.55;
      color: #e2e8f0;
    }

    .msg.ia .msg-balao {
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.25);
      border-bottom-left-radius: 4px;
    }

    .msg.usuario .msg-balao {
      background: linear-gradient(135deg,#7c3aed,#5b21b6);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .msg-hora {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-top: 3px;
    }

    .msg.ia .msg-hora { text-align: left; margin-left: 4px; }
    .msg.usuario .msg-hora { text-align: right; margin-right: 4px; }

    /* Typing */
    .typing-balao {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(124,58,237,0.8);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input */
    .chat-input-area {
      padding: 12px 14px;
      border-top: 1px solid rgba(124,58,237,0.2);
      background: rgba(7,7,26,0.9);
      flex-shrink: 0;
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 22px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus { border-color: rgba(124,58,237,0.6); }
    .chat-input::placeholder { color: rgba(255,255,255,0.3); }

    .chat-send {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg,#7c3aed,#06b6d4);
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .chat-send:hover { transform: scale(1.08); }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .chat-rodape {
      text-align: center;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      margin-top: 6px;
    }

    /* Perguntas sugeridas */
    .sugestoes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 16px 10px;
      flex-shrink: 0;
      background: #0d0d2b;
    }

    .sug-btn {
      padding: 5px 11px;
      border-radius: 999px;
      border: 1px solid rgba(124,58,237,0.3);
      background: transparent;
      color: rgba(124,58,237,0.9);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .sug-btn:hover {
      background: rgba(124,58,237,0.15);
      border-color: rgba(124,58,237,0.6);
    }

    @media (max-width: 420px) {
      #humanai-chat { width: calc(100vw - 16px); right: 8px; bottom: 88px; }
    }
  </style>
</head>
<body>

<!-- Botão flutuante -->
<button id="humanai-btn" onclick="toggleChat()" title="Falar com a IA">
  💬
  <div id="humanai-notif">1</div>
</button>

<!-- Janela do chat -->
<div id="humanai-chat">

  <div class="chat-header">
    <div class="chat-header-avatar" id="chat-widget-avatar">👩‍💼</div>
    <div class="chat-header-info">
      <div class="chat-header-nome" id="chat-widget-nome">Ana · Studio Bella</div>
      <div class="chat-header-status">
        <span class="status-verde"></span>
        Online agora — responde em segundos
      </div>
    </div>
    <button class="btn-fechar" onclick="toggleChat()">✕</button>
  </div>

  <div class="chat-msgs" id="widget-msgs"></div>

  <div class="sugestoes" id="widget-sugestoes">
    <button class="sug-btn" onclick="enviarSugestao(this)">Quais serviços oferecem?</button>
    <button class="sug-btn" onclick="enviarSugestao(this)">Horário de atendimento?</button>
    <button class="sug-btn" onclick="enviarSugestao(this)">Como agendar?</button>
  </div>

  <div class="chat-input-area">
    <div class="chat-input-row">
      <input
        type="text"
        class="chat-input"
        id="widget-input"
        placeholder="Digite sua mensagem..."
        onkeydown="if(event.key==='Enter') enviarMensagem()"
        maxlength="500"
      />
      <button class="chat-send" id="widget-send" onclick="enviarMensagem()">➤</button>
    </div>
    <div class="chat-rodape">Atendimento por HumanAI ✨ · Powered by IA</div>
  </div>

</div>

<script>
  // ── Configuração (será preenchida pela empresa) ──
  const CONFIG = {
    empresaId: window.HUMANAI_EMPRESA_ID || 'empresa_demo_1',
    nomeIA:    window.HUMANAI_NOME_IA    || 'Ana',
    emoji:     window.HUMANAI_EMOJI      || '👩‍💼',
    empresa:   window.HUMANAI_EMPRESA    || 'Studio Bella',
    apiUrl:    window.HUMANAI_API_URL    || 'https://agenciahumanai.loca.lt',
    cor:       window.HUMANAI_COR        || '#7c3aed'
  };

  // Aplicar configurações
  document.getElementById('chat-widget-avatar').textContent = CONFIG.emoji;
  document.getElementById('chat-widget-nome').textContent = `${CONFIG.nomeIA} · ${CONFIG.empresa}`;

  let aberto = false;
  let aguardando = false;
  let clienteId = 'site_' + Math.random().toString(36).substr(2,9);

  function toggleChat() {
    aberto = !aberto;
    const chat = document.getElementById('humanai-chat');
    const btn = document.getElementById('humanai-btn');
    const notif = document.getElementById('humanai-notif');

    if (aberto) {
      chat.classList.add('aberto');
      btn.textContent = '✕';
      if (notif) notif.remove();
      // Mensagem de boas-vindas na primeira abertura
      if (document.getElementById('widget-msgs').children.length === 0) {
        setTimeout(() => mostrarTyping(true), 500);
        setTimeout(() => {
          mostrarTyping(false);
          adicionarMsg(`Olá! 😊 Sou ${CONFIG.nomeIA} e estou aqui para ajudar. O que posso fazer por você hoje?`, 'ia');
        }, 1800);
      }
    } else {
      chat.classList.remove('aberto');
      btn.innerHTML = '💬';
    }
  }

  function adicionarMsg(texto, tipo) {
    const area = document.getElementById('widget-msgs');
    const agora = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

    const wrap = document.createElement('div');
    wrap.className = `msg ${tipo}`;

    if (tipo === 'ia') {
      wrap.innerHTML = `
        <div class="msg-av ia-av">${CONFIG.emoji}</div>
        <div>
          <div class="msg-balao">${texto.replace(/\n/g,'<br>')}</div>
          <div class="msg-hora">${agora}</div>
        </div>`;
    } else {
      wrap.innerHTML = `
        <div>
          <div class="msg-balao">${texto.replace(/\n/g,'<br>')}</div>
          <div class="msg-hora">${agora}</div>
        </div>
        <div class="msg-av us-av">👤</div>`;
    }

    area.appendChild(wrap);
    area.scrollTop = area.scrollHeight;

    // Esconder sugestões após primeira mensagem
    const sug = document.getElementById('widget-sugestoes');
    if (sug && tipo === 'usuario') sug.style.display = 'none';
  }

  function mostrarTyping(mostrar) {
    const area = document.getElementById('widget-msgs');
    const existente = document.getElementById('typing-widget');

    if (mostrar && !existente) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ia';
      wrap.id = 'typing-widget';
      wrap.innerHTML = `
        <div class="msg-av ia-av">${CONFIG.emoji}</div>
        <div class="typing-balao">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>`;
      area.appendChild(wrap);
      area.scrollTop = area.scrollHeight;
    } else if (!mostrar && existente) {
      existente.remove();
    }
  }

  async function enviarMensagem() {
    const input = document.getElementById('widget-input');
    const texto = input.value.trim();
    if (!texto || aguardando) return;

    adicionarMsg(texto, 'usuario');
    input.value = '';
    aguardando = true;
    document.getElementById('widget-send').disabled = true;

    const delay = 1000 + Math.random() * 1000;
    setTimeout(() => mostrarTyping(true), 300);

    try {
      const res = await fetch(`${CONFIG.apiUrl}/api/testar-ia`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Bypass-Tunnel-Reminder': 'true'
        },
        body: JSON.stringify({
          mensagem: texto,
          empresaId: CONFIG.empresaId,
          clienteId: clienteId
        })
      });

      const dados = await res.json();
      setTimeout(() => {
        mostrarTyping(false);
        adicionarMsg(dados.dados?.resposta || 'Um momento, já te respondo! 😊', 'ia');
        aguardando = false;
        document.getElementById('widget-send').disabled = false;
      }, delay);

    } catch (e) {
      // Fallback local se o servidor não estiver acessível
      const respostas = [
        `Olá! 😊 Fico feliz em te atender. Como posso ajudar?`,
        `Recebi sua mensagem! Me dá um instante que já te respondo com prazer 🌟`,
        `Obrigada pelo contato! Pode contar mais sobre o que precisa? 💜`
      ];
      setTimeout(() => {
        mostrarTyping(false);
        adicionarMsg(respostas[Math.floor(Math.random()*respostas.length)], 'ia');
        aguardando = false;
        document.getElementById('widget-send').disabled = false;
      }, delay);
    }
  }

  function enviarSugestao(btn) {
    document.getElementById('widget-input').value = btn.textContent;
    enviarMensagem();
  }
</script>

</body>
</html>
